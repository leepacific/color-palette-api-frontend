          $ref: '#/components/schemas/WcagReport'
    ThemeMode:
      type: string
      enum:
      - light
      - dark
      - both
    ThemeOptions:
      type: object
      properties:
        includePrimitiveRamps:
          type:
          - boolean
          - 'null'
        wcagTarget:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WcagTarget'
    ThemeRequest:
      type: object
      required:
      - primary
      - mode
      properties:
        framework:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Framework'
        mode:
          $ref: '#/components/schemas/ThemeMode'
        options:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ThemeOptions'
        primary:
          type: string
        seed:
          type:
          - string
          - 'null'
          description: 'Sprint 6 Pillar 6: 13-char Crockford Base32 seed for deterministic
            output.'
        semanticTokens:
          type:
          - boolean
          - 'null'
          description: 'Sprint 6 Pillar 1: when true, response includes a 28-slot
            shadcn-compatible

            semantic token bundle in `extendedSemantic`.'
    TokenFormat:
      type: string
      enum:
      - dtcg
      - legacy
    UserBody:
      type: object
      required:
      - tier
      - tierSource
      - keyPrefix
      - keyCreatedAt
      properties:
        displayName:
          type:
          - string
          - 'null'
        email:
          type:
          - string
          - 'null'
        firebaseUid:
          type:
          - string
          - 'null'
        githubLogin:
          type:
          - string
          - 'null'
        keyCreatedAt:
          type: string
        keyPrefix:
          type: string
        lastUsedAt:
          type:
          - string
          - 'null'
        monthlyQuota:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        tier:
          type: string
        tierExpiresAt:
          type:
          - string
          - 'null'
        tierSource:
          type: string
        tierVerifiedAt:
          type:
          - string
          - 'null'
        usageThisMonth:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
    WcagLevel:
      type: object
      required:
      - normalText
      - largeText
      properties:
        largeText:
          type: boolean
        normalText:
          type: boolean
    WcagReport:
      type: object
      required:
      - enforced
      - target
      - pairsChecked
      - pairsAdjusted
      - adjustedPairs
      properties:
        adjustedPairs:
          type: array
          items:
            type: string
        enforced:
          type: boolean
        pairsAdjusted:
          type: integer
          format: int32
          minimum: 0
        pairsChecked:
          type: integer
          format: int32
          minimum: 0
        target:
          $ref: '#/components/schemas/WcagTarget'
    WcagTarget:
      type: string
      enum:
      - AA
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
