openapi: 3.1.0
info:
  title: Color Palette API
  description: 'Developer-first REST API for generating coolors.co-quality color palettes
    with 9-metric quality scoring. Sprint 5: Stripe-style envelope + camelCase + utoipa-generated
    OpenAPI 3.1.'
  license:
    name: ''
  version: 1.5.0
servers:
- url: https://color-palette-api-production-a68b.up.railway.app
  description: Production
- url: http://localhost:3000
  description: Local development
paths:
  /api/v1/admin/keys:
    get:
      tags:
      - admin
      operationId: listApiKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_Resource_ApiKeyWire'
        '403':
          description: Not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
    post:
      tags:
      - admin
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
        required: true
      responses:
        '200':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ApiKeyWire'
        '400':
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/admin/keys/{id}:
    delete:
      tags:
      - admin
      operationId: deleteApiKey
      parameters:
      - name: id
        in: path
        description: Key ID
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/admin/stats:
    get:
      tags:
      - admin
      operationId: adminStats
      responses:
        '200':
          description: Service stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_AdminStatsResponse'
        '403':
          description: Not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/admin/users/{firebase_uid}/tier:
    post:
      tags:
      - admin
      operationId: setUserTier
      parameters:
      - name: firebase_uid
        in: path
        description: Firebase UID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTierRequest'
        required: true
      responses:
        '200':
          description: Tier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_SetTierBody'
        '400':
          description: Invalid tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/analyze/contrast:
    post:
      tags:
      - analysis
      operationId: analyzeContrast
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContrastRequest'
        required: true
      responses:
        '200':
          description: WCAG contrast ratio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ContrastResponse'
        '400':
          description: Invalid hex
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/analyze/contrast-matrix:
    post:
      tags:
      - analysis
      operationId: analyzeContrastMatrix
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContrastMatrixRequest'
        required: true
      responses:
        '200':
          description: WCAG contrast matrix + colorblind simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ContrastMatrixResponse'
        '400':
          description: Invalid palette or severity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/analyze/explain:
    post:
      tags:
      - analysis
      operationId: analyzeExplain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaletteExplanationRequest'
        required: true
      responses:
        '200':
          description: Palette explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_PaletteExplanation'
        '400':
          description: Invalid palette or hint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/analyze/palette:
    post:
      tags:
      - analysis
      operationId: analyzePalette
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzePaletteRequest'
        required: true
      responses:
        '200':
          description: Palette analysis metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_PaletteAnalysisResponse'
        '400':
          description: Invalid palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/auth/exchange:
    post:
      tags:
      - auth
      operationId: authExchange
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
        required: true
      responses:
        '200':
          description: API key issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ExchangeBody'
        '400':
          description: Missing firebaseIdToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Throttled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Firebase unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/color/shades:
    post:
      tags:
      - color
      operationId: generateShades
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShadesRequest'
        required: true
      responses:
        '200':
          description: Generated shades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ColorListWire'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/color/{color}:
    get:
      tags:
      - color
      operationId: getColorInfo
      parameters:
      - name: color
        in: path
        description: Hex color, e.g. 4A90D9
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Color information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ColorInfoResponse'
        '400':
          description: Invalid color hex
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/color/{color}/blindness:
    get:
      tags:
      - color
      operationId: getColorBlindness
      parameters:
      - name: color
        in: path
        description: Hex color
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Color-blindness simulation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_BlindnessResponse'
        '400':
          description: Invalid color hex
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/docs:
    get:
      tags:
      - docs
      operationId: docsRedirect
      responses:
        '308':
          description: Permanent redirect to /swagger-ui
  /api/v1/export/code:
    post:
      tags:
      - export
      summary: 'Sprint 6 Pillar 2: unified 9-format code export endpoint.'
      operationId: exportCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeExportRequest'
        required: true
      responses:
        '200':
          description: Code export ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_CodeExportResponse'
        '400':
          description: Invalid format or input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/export/css:
    post:
      tags:
      - export
      operationId: exportCss
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
        required: true
      responses:
        '200':
          description: CSS variables code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ExportResponse'
        '400':
          description: Invalid palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/export/design-tokens:
    post:
      tags:
      - export
      operationId: exportDesignTokens
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignTokensRequest'
        required: true
      responses:
        '200':
          description: Design tokens export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_DesignTokensBody'
        '400':
          description: Missing theme or palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/export/figma-variables:
    post:
      tags:
      - export
      operationId: exportFigmaVariables
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigmaVariablesRequest'
        required: true
      responses:
        '200':
          description: Figma Variables export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_FigmaVariablesBody'
        '400':
          description: Missing theme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/export/scss:
    post:
      tags:
      - export
      operationId: exportScss
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
        required: true
      responses:
        '200':
          description: SCSS variables code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ExportResponse'
        '400':
          description: Invalid palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/export/tailwind:
    post:
      tags:
      - export
      operationId: exportTailwind
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
        required: true
      responses:
        '200':
          description: Tailwind config snippet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ExportResponse'
        '400':
          description: Invalid palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/health:
    get:
      tags:
      - health
      operationId: health
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_HealthResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/palette/adjust:
    post:
      tags:
      - palette
      operationId: adjustPalette
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustRequest'
        required: true
      responses:
        '200':
          description: Adjusted palette
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ColorListWire'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/palette/blend:
    post:
      tags:
      - palette
      operationId: blendPalette
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlendRequest'
        required: true
      responses:
        '200':
          description: Blended color list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_ColorListWire'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/palette/generate:
    post:
      tags:
      - palette
      operationId: generatePalette
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
        required: true
      responses:
        '200':
          description: Palette generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_PaletteWire'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Quality gate could not be satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited or quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/palette/lock:
    post:
      tags:
      - palette
      operationId: lockPalette
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockRequest'
        required: true
      responses:
        '200':
          description: Locked palette generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_PaletteWire'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Quality gate could not be satisfied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/palette/random:
    get:
      tags:
      - palette
      operationId: randomPalette
      responses:
        '200':
          description: Random palette generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_PaletteWire'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited or quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/theme/generate:
    post:
      tags:
      - theme
      operationId: generateTheme
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThemeRequest'
        required: true
      responses:
        '200':
          description: Generated theme bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_Theme'
        '400':
          description: Invalid primary color
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Quality gate or WCAG unachievable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/user/account:
    delete:
      tags:
      - user
      operationId: deleteAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
        required: true
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_DeleteBody'
        '400':
          description: Missing Firebase ID token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid token or UID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Legacy key cannot delete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Firebase unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/user/me:
    get:
      tags:
      - user
      operationId: getUserMe
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_UserBody'
        '401':
          description: Missing/invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/user/quota:
    get:
      tags:
      - user
      operationId: getUserQuota
      responses:
        '200':
          description: Monthly quota snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_QuotaBody'
        '401':
          description: Missing/invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
  /api/v1/user/rotate-key:
    post:
      tags:
      - user
      operationId: rotateApiKey
      responses:
        '200':
          description: New API key issued; old key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource_RotateBody'
        '401':
          description: Missing/invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Legacy key cannot rotate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - apiKey: []
components:
  schemas:
    AdjustRequest:
      type: object
      required:
      - palette
      properties:
        brightnessScale:
          type:
          - number
          - 'null'
          format: double
        hueShift:
          type:
          - number
          - 'null'
          format: double
        palette:
          type: array
          items:
            type: string
        saturationScale:
          type:
          - number
          - 'null'
          format: double
        temperatureShift:
          type:
          - number
          - 'null'
          format: double
    AdminStatsResponse:
      type: object
      required:
      - totalRequests
      - activeKeys
      - requestsToday
      properties:
        activeKeys:
          type: integer
          format: int64
        requestsToday:
          type: integer
          format: int64
        totalRequests:
          type: integer
          format: int64
    AnalysisMetrics:
      type: object
      required:
      - harmony
      - distinctness
      - lightnessDistribution
      - temperatureCoherence
      - saturationCoherence
      - gamutSpread
      - uiUtility
      - colorBlindSafety
      - accessibility
      properties:
        accessibility:
          type: number
          format: double
        colorBlindSafety:
          type: number
          format: double
        distinctness:
          type: number
          format: double
        gamutSpread:
          type: number
          format: double
        harmony:
          type: number
          format: double
        lightnessDistribution:
          type: number
          format: double
        saturationCoherence:
          type: number
          format: double
        temperatureCoherence:
          type: number
          format: double
        uiUtility:
          type: number
          format: double
    AnalyzePaletteRequest:
      type: object
      required:
      - palette
      properties:
        palette:
          type: array
          items:
            type: string
    ApiKey:
      type: object
      required:
      - id
      - name
      - role
      - createdAt
      - requestCount
      properties:
        createdAt:
          type: string
        id:
          type: string
        key:
          type:
          - string
          - 'null'
        lastUsedAt:
          type:
          - string
          - 'null'
        name:
          type: string
        requestCount:
          type: integer
          format: int64
        role:
          type: string
    ApiKeyWire:
      type: object
      description: 'Sprint 5 wire projection: omits `id` and `createdAt` (they become
        the

        envelope''s top-level `id`/`createdAt` via `Resource<ApiKeyWire>`).'
      required:
      - name
      - role
      - requestCount
      properties:
        key:
          type:
          - string
          - 'null'
        lastUsedAt:
          type:
          - string
          - 'null'
        name:
          type: string
        requestCount:
          type: integer
          format: int64
        role:
          type: string
    BlendRequest:
      type: object
      required:
      - colors
      properties:
        colors:
          type: array
          items:
            type: string
        steps:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
    BlindnessResponse:
      type: object
      required:
      - original
      - protanopia
      - deuteranopia
      - tritanopia
      - achromatopsia
      properties:
        achromatopsia:
          type: string
        deuteranopia:
          type: string
        original:
          type: string
        protanopia:
          type: string
        tritanopia:
          type: string
    ChromaRange:
      type: object
      required:
      - min
      - max
      - mean
      properties:
        max:
          type: number
          format: double
        mean:
          type: number
          format: double
        min:
          type: number
          format: double
    CmykValue:
      type: object
      required:
      - c
      - m
      - y
      - k
      properties:
        c:
          type: number
          format: double
        k:
          type: number
          format: double
        m:
          type: number
          format: double
        y:
          type: number
          format: double
    CodeExportFormat:
      type: string
      description: The 9 supported code export formats.
      enum:
      - tailwind-config
      - css-vars-hex
      - css-vars-oklch
      - shadcn-globals
      - scss
      - mui-palette
      - swift-uicolor
      - android-xml
      - dtcg-json
    CodeExportRequest:
